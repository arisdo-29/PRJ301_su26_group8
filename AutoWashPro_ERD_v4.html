<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoWash Pro – ERD v4.0 (Cách C)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 24px; }
  h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 6px; }
  .badge {
    display: inline-block; background: #1D9E75; color: #fff;
    font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 20px; margin-bottom: 16px;
  }
  #erd-container {
    background: #fff; border-radius: 12px;
    border: 1px solid #e0e0e0; padding: 24px; overflow-x: auto;
  }
  .legend {
    margin-top: 16px; display: flex; gap: 24px; flex-wrap: wrap;
    font-size: 12px; color: #555;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
  .loading { color: #888; font-size: 14px; text-align: center; padding: 40px; }
</style>
</head>
<body>
<h1>AutoWash Pro – Entity Relationship Diagram</h1>
<p class="subtitle">Database Schema v4.0 · SQL Server · 12 bảng</p>
<span class="badge">⭐ Cách C: Gộp admins + customers → 1 bảng users</span>

<div id="erd-container">
  <p class="loading" id="loading-msg">Đang tải ERD...</p>
  <div id="erd"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div> Bảng users (trung tâm)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#534AB7"></div> Bảng hỗ trợ loyalty</div>
  <div class="legend-item"><div class="legend-dot" style="background:#185FA5"></div> Bảng giao dịch</div>
  <div class="legend-item"><div class="legend-dot" style="background:#BA7517"></div> Bảng danh mục</div>
</div>

<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';

await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: 'Arial, sans-serif',
  themeVariables: {
    fontSize: '13px',
    fontFamily: 'Arial, sans-serif',
    lineColor: '#73726c',
    textColor: '#3d3d3a',
    primaryColor: '#E1F5EE',
    primaryBorderColor: '#0F6E56',
    primaryTextColor: '#085041',
    secondaryColor: '#EEEDFE',
    tertiaryColor: '#E6F1FB',
    background: '#ffffff',
  },
});

const diagram = `erDiagram
  tiers {
    int id PK
    nvarchar name UK
    int min_washes
    decimal min_spend
    decimal point_rate
    int book_days
    bit free_upgrade
    bit free_wash
    int priority
  }

  users {
    int id PK
    nvarchar login_id UK
    nvarchar password_hash
    nvarchar role
    nvarchar full_name
    nvarchar email UK
    bit is_active
    datetime2 created_at
  }

  vehicles {
    int id PK
    int user_id FK
    nvarchar plate UK
    nvarchar type
    nvarchar brand
    nvarchar model
    nvarchar color
    bit is_primary
    datetime2 created_at
  }

  loyalty_accounts {
    int id PK
    int user_id FK
    int tier_id FK
    int points
    int total_points
    decimal total_spend
    int total_washes
    date tier_since
    date next_review
    bit free_wash_used
    bit free_upg_used
    datetime2 updated_at
  }

  services {
    int id PK
    nvarchar name
    nvarchar description
    decimal price
    int duration_min
    bit is_active
  }

  bookings {
    int id PK
    int user_id FK
    int vehicle_id FK
    int service_id FK
    date scheduled_date
    time scheduled_time
    nvarchar status
    int priority
    nvarchar notes
    datetime2 created_at
    datetime2 updated_at
  }

  point_logs {
    int id PK
    int account_id FK
    int booking_id FK
    nvarchar type
    int amount
    int balance
    nvarchar note
    date expires_at
    datetime2 created_at
  }

  wash_sessions {
    int id PK
    int booking_id FK
    int vehicle_id FK
    int service_id FK
    nvarchar lpr_plate
    datetime2 started_at
    datetime2 ended_at
    decimal price
    int points_earn
    decimal discount
    nvarchar pay_method
  }

  rewards {
    int id PK
    nvarchar name
    nvarchar type
    int points_cost
    decimal value
    int min_tier_id FK
    date valid_from
    date valid_to
    bit is_active
  }

  redemptions {
    int id PK
    int account_id FK
    int reward_id FK
    int booking_id FK
    int points_spent
    nvarchar status
    date expires_at
    datetime2 created_at
  }

  promotions {
    int id PK
    nvarchar name
    nvarchar description
    nvarchar type
    decimal value
    int min_tier_id FK
    date start_date
    date end_date
    bit is_active
    int created_by FK
  }

  promotion_services {
    int id PK
    int promotion_id FK
    int service_id FK
  }

  users ||--o{ vehicles : "sở hữu"
  users ||--|| loyalty_accounts : "có ví điểm"
  users ||--o{ bookings : "đặt lịch"
  users ||--o{ promotions : "tạo KM"
  tiers ||--o{ loyalty_accounts : "phân loại"
  tiers ||--o{ rewards : "yêu cầu bậc"
  tiers ||--o{ promotions : "nhắm mục tiêu"
  vehicles ||--o{ bookings : "xuất hiện trong"
  vehicles ||--o{ wash_sessions : "được rửa"
  services ||--o{ bookings : "được đặt"
  services ||--o{ wash_sessions : "được thực hiện"
  services ||--o{ promotion_services : "thuộc KM"
  promotions ||--o{ promotion_services : "áp dụng cho"
  loyalty_accounts ||--o{ point_logs : "ghi nhật ký"
  loyalty_accounts ||--o{ redemptions : "đổi thưởng"
  bookings ||--o{ point_logs : "phát sinh điểm"
  bookings ||--o| wash_sessions : "liên kết session"
  bookings ||--o{ redemptions : "áp dụng ưu đãi"
  rewards ||--o{ redemptions : "được đổi"
`;

try {
  const { svg } = await mermaid.render('erd-svg', diagram);
  document.getElementById('loading-msg').remove();
  document.getElementById('erd').innerHTML = svg;

  // Round entity corners
  document.querySelectorAll('#erd svg .node').forEach(node => {
    const firstPath = node.querySelector('path[d]');
    if (!firstPath) return;
    const d = firstPath.getAttribute('d');
    const nums = d.match(/-?[\d.]+/g)?.map(Number);
    if (!nums || nums.length < 8) return;
    const xs = [nums[0], nums[2], nums[4], nums[6]];
    const ys = [nums[1], nums[3], nums[5], nums[7]];
    const x = Math.min(...xs), y = Math.min(...ys);
    const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x); rect.setAttribute('y', y);
    rect.setAttribute('width', w); rect.setAttribute('height', h);
    rect.setAttribute('rx', '8');
    for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
      if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
    }
    firstPath.replaceWith(rect);
  });

  // Strip borders from attribute rows
  document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
    p.setAttribute('stroke', 'none');
  });

} catch(e) {
  document.getElementById('loading-msg').textContent = 'Lỗi render ERD: ' + e.message;
  console.error(e);
}
</script>
</body>
</html>
